<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODAM — Продай авто как дилер</title>
    <style>
        /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            color: #1a2639;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-on-scroll {
            opacity: 0;
            transition: all 0.8s ease;
        }

        .animate-on-scroll.visible {
            animation: fadeInUp 0.8s forwards;
        }

        /* ===== ШАПКА ===== */
        .header {
            padding: 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: fadeIn 1s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-icon {
            font-size: 36px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #2b3a67, #3a4f8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav a {
            text-decoration: none;
            color: #2d3e6f;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        .nav a:hover {
            color: #1e2b4f;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3a4f8c;
            transition: width 0.3s;
        }

        .nav a:hover::after {
            width: 100%;
        }

        /* переключатель языка */
        .lang-switch {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.5);
            padding: 4px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: #2d3e6f;
        }
        .lang-btn.active {
            background: #2b3a67;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #2b3a67, #3a4f8c);
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(42, 65, 112, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(42, 65, 112, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #2b3a67;
            color: #2b3a67;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #2b3a67;
            color: white;
        }

        /* ===== ГЕРОЙ ===== */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            padding: 60px 0;
            animation: fadeIn 1.2s ease;
        }

        .hero-content h2 {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1e2b4f, #2b3a67);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        .stat-item h3 {
            font-size: 32px;
            font-weight: 700;
            color: #1e2b4f;
        }

        .stat-item p {
            font-size: 14px;
            color: #718096;
            margin-bottom: 0;
        }

        .hero-image {
            position: relative;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            transform: perspective(1000px) rotateY(-5deg);
            transition: transform 0.5s;
        }

        .hero-image:hover img {
            transform: perspective(1000px) rotateY(0deg);
        }

        /* ===== КАК ЭТО РАБОТАЕТ ===== */
        .section {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a2639;
        }

        .section-subtitle {
            text-align: center;
            font-size: 18px;
            color: #718096;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .step-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.4s;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #2b3a67, #5a7bb9);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .step-card:hover::before {
            transform: translateX(0);
        }

        .step-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(42, 65, 112, 0.2);
        }

        .step-number {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2b3a67, #3a4f8c);
            color: white;
            font-size: 24px;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .step-card h3 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .step-card p {
            color: #718096;
            font-size: 14px;
        }

        /* ===== ПРЕИМУЩЕСТВА ===== */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .feature-card {
            background: white;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            transition: all 0.3s;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .feature-card.visible {
            animation: fadeInUp 0.8s forwards;
        }

        .feature-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(42, 65, 112, 0.15);
        }

        .feature-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: inline-block;
            background: linear-gradient(135deg, #2b3a67, #3a4f8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-card h3 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #718096;
        }

        /* ===== ТАРИФЫ ===== */
        .pricing {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .pricing-card {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .pricing-card:hover {
            transform: scale(1.03);
            border-color: #2b3a67;
            box-shadow: 0 25px 50px rgba(42, 65, 112, 0.2);
        }

        .pricing-card.popular {
            border: 2px solid #3a4f8c;
            transform: scale(1.05);
        }

        .pricing-card.popular::before {
            content: '🔥 Самы папулярны';
            position: absolute;
            top: 15px;
            right: -35px;
            background: #3a4f8c;
            color: white;
            padding: 8px 40px;
            font-size: 12px;
            font-weight: 600;
            transform: rotate(45deg);
            white-space: nowrap;
        }

        .pricing-card h3 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .price {
            font-size: 42px;
            font-weight: 800;
            color: #1e2b4f;
            margin-bottom: 5px;
        }

        .price small {
            font-size: 16px;
            font-weight: 400;
            color: #718096;
        }

        .pricing-features {
            list-style: none;
            margin: 30px 0;
        }

        .pricing-features li {
            padding: 10px 0;
            border-bottom: 1px solid #edf2f7;
            color: #4a5568;
        }

        .pricing-features li:last-child {
            border-bottom: none;
        }

        /* ===== CTA ===== */
        .cta {
            background: linear-gradient(135deg, #1e2b4f, #2b3a67);
            border-radius: 30px;
            padding: 80px 60px;
            text-align: center;
            color: white;
            margin: 60px 0;
        }

        .cta h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .cta p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 30px;
            opacity: 0.9;
        }

        .cta .btn {
            background: white;
            color: #1e2b4f;
            font-size: 18px;
            padding: 16px 48px;
        }

        .cta .btn:hover {
            background: #f0f4ff;
        }

        /* ===== ФУТЕР ===== */
        .footer {
            padding: 40px 0;
            border-top: 1px solid #d0d9e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: #4a5568;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #1e2b4f;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 1024px) {
            .hero h2 {
                font-size: 38px;
            }
            .steps, .features, .pricing {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-content p {
                margin-left: auto;
                margin-right: auto;
            }
            .hero-stats {
                justify-content: center;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .nav {
                justify-content: center;
            }
            .steps, .features, .pricing {
                grid-template-columns: 1fr;
            }
            .pricing-card.popular {
                transform: scale(1);
            }
            .cta {
                padding: 40px 20px;
            }
            .cta h2 {
                font-size: 30px;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

        // Переключение языка
        const langBtns = document.querySelectorAll('.lang-btn');
        let currentLang = localStorage.getItem('prodam-lang') || 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            // Обновить активный класс на кнопках
            langBtns.forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Обновить все тексты на странице
            const translationsMap = translations[lang];
            for (const [key, value] of Object.entries(translationsMap)) {
                const element = document.getElementById(key);
                if (element) {
                    // Для заголовков с HTML (например, <br>)
                    if (key === 'hero-title' || key.includes('title')) {
                        element.innerHTML = value;
                    } else {
                        element.textContent = value;
                    }
                }
            }
            
            localStorage.setItem('prodam-lang', lang);
        }

        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.dataset.lang);
            });
        });

        // Установить начальный язык
        setLanguage(currentLang);

        // анимации при скролле
        function isElementInViewport(el) {
            const rect = el.getBoundingClientRect();
            return (
                rect.top <= (window.innerHeight || document.documentElement.clientHeight) * 0.85 &&
                rect.bottom >= 0
            );
        }

        function handleScrollAnimations() {
            const elements = document.querySelectorAll('.animate-on-scroll');
            elements.forEach(el => {
                if (isElementInViewport(el)) {
                    el.classList.add('visible');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', handleScrollAnimations);
        window.addEventListener('scroll', handleScrollAnimations);
        window.addEventListener('load', function() {
            setTimeout(handleScrollAnimations, 200);
        });
    </script>
